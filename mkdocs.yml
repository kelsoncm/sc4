site_name: sc4py
site_description: Python utility helpers — date/time, env, class loading, numbers, strings, choices, ZIP
site_author: Kelson da Costa Medeiros
site_url: https://kelsoncm.github.io/sc4/
repo_url: https://github.com/kelsoncm/sc4
repo_name: kelsoncm/sc4
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API Reference:
    - choice: api/choice.md
    - datetime: api/datetime.md
    - env: api/env.md
    - klass: api/klass.md
    - number: api/number.md
    - str: api/str.md
    - zip: api/zip.md
  - Changelog: changelog.md
